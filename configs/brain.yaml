llm:
  structured_retry_count: 1

search:
  num_rollouts: 8
  max_depth: 6
  max_child_nodes: 4
  exploration_weight: 2.0
  discount_factor: 1.0
  max_kg_triplets: 15

kg:
  entity_link_threshold: 0.72
  top_k_entity_matches: 5
  disable_kg_below_threshold: true

path_evaluation:
  consistency_weight: 0.3
  diversity_weight: 0.4
  agent_eval_weight: 0.3
  agent_eval_mode: llm_verifier
  llm_verifier_min_turn_index: 2
  llm_verifier_min_trajectory_count: 2

a1:
  use_llm_extractor: true

a2:
  expand_top_k_hypotheses: 3

a3:
  use_discriminative_gain: true
  validation_limit: 10

repair:
  enable_verifier_hypothesis_reshuffle: true
  enable_best_repair_action: true
  enable_tree_reroot: true

fallback:
  enable_question_selector_mode: true
  max_fail_count: 2

stop:
  min_turn_index_before_final_answer: 2
  min_trajectory_count_before_accept: 2
  min_answer_consistency: 0.45
  min_agent_eval_score: 0.72
  min_final_score: 0.6
  require_verifier_accept_flag: true
  acceptance_profile: anchor_controlled
  enable_evidence_profile_acceptance: true
  min_low_cost_profile_families: 2
  min_low_cost_profile_present_clear_count: 2
  min_low_cost_profile_stable_top_count: 2
  allow_soft_verifier_reject_with_evidence_profile: true
